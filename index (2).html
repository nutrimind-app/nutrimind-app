<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NutriMind · Aprende y cuida tu alimentación</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f9f7f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            height: 700px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .app-header {
            background: linear-gradient(125deg, #A7E0D0, #7EC8B3);
            color: white;
            padding: 28px 22px 24px 22px;
            position: relative;
            overflow: hidden;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
        }
        .app-header::after {
            content: "🍎🥑🍓🥗🌸";
            font-size: 80px;
            position: absolute;
            bottom: -20px;
            right: -15px;
            opacity: 0.2;
            pointer-events: none;
        }
        .app-header h1 { font-size: 1.9rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .greeting { font-size: 1rem; margin-top: 8px; font-weight: 500; background: rgba(255,255,240,0.2); display: inline-block; padding: 4px 12px; border-radius: 40px; }
        .main-content { flex: 1; overflow-y: auto; padding: 22px 18px; scroll-behavior: smooth; }
        .bottom-nav {
            background: #ffffff;
            border-top: 2px solid #f0ebe5;
            display: flex;
            justify-content: space-around;
            padding: 10px 12px 18px;
            border-radius: 32px 32px 0 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b2afa9;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-item i { font-size: 1.6rem; }
        .nav-item.active { color: #6BB8A2; background: #F2F9F6; transform: translateY(-3px); }
        .card {
            background: #ffffff;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid #f3efe9;
        }
        .card-title { font-weight: 800; font-size: 1.25rem; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; color: #3A5E4F; }
        .btn-primary {
            background: linear-gradient(95deg, #FFB347, #FF9F2E);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(255,160,60,0.2);
            transition: 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .btn-outline {
            background: #F9F4EF;
            border: 1.5px solid #EADBCE;
            border-radius: 60px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            color: #5C7C6B;
        }
        .hidden { display: none; }
        .alert-banner {
            background: #FFF2DF;
            border-left: 6px solid #FFB347;
            padding: 12px 16px;
            border-radius: 24px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .risk-alert {
            background: #FFEBEE;
            border-left: 6px solid #F44336;
            color: #B71C1C;
        }
        .semaphore { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .light { width: 56px; height: 56px; border-radius: 50%; background: #E8E2D9; transition: all 0.2s; }
        .light.green { background: #A2D9A3; box-shadow: 0 0 12px #A2D9A3; }
        .light.yellow { background: #FFE08C; box-shadow: 0 0 12px #FFE08C; }
        .light.red { background: #FFB3B3; box-shadow: 0 0 12px #FFB3B3; }
        .reminder-checkbox { display: flex; align-items: center; gap: 12px; margin: 12px 0; background: #FDF7F0; padding: 10px 12px; border-radius: 60px; }
        .notes-area { width: 100%; border-radius: 28px; border: 1px solid #F0E4D8; padding: 12px; font-family: 'Nunito', sans-serif; background: #FFFCF9; }
        .quote-card { background: #FFFAF0; border-radius: 32px; padding: 16px; text-align: center; font-style: italic; font-weight: 600; color: #8B6B4A; margin-bottom: 18px; cursor: pointer; border: 1px solid #FFE3C2; }
        .quiz-module {
            background: #FEF9F2;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 28px;
            border: 2px solid #FFD89A;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .quiz-header { margin-bottom: 16px; border-bottom: 2px dashed #FFD89A; padding-bottom: 12px; }
        .quiz-header h3 { font-size: 1.3rem; color: #6B4C2C; margin: 0; }
        .question-item { margin-bottom: 20px; background: white; border-radius: 24px; padding: 12px; border: 1px solid #f0e0c0; }
        .question-text { font-weight: 700; margin-bottom: 10px; color: #4a3a2a; }
        .options { display: flex; gap: 20px; flex-wrap: wrap; }
        .quiz-result { background: #E8F5E9; border-radius: 24px; padding: 12px; margin-top: 12px; text-align: center; }
        .contacto-emergencia, .contacto-psicologia {
            background: #FEF3E0;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .food-log { background: #F7F2EA; border-radius: 24px; padding: 15px; margin-bottom: 15px; }
        .food-log input, .food-log select { width: 100%; margin-bottom: 8px; border-radius: 60px; border: 1px solid #EADBCE; padding: 8px 12px; }
        .food-log-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .food-log-row input, .food-log-row select { flex: 1; margin-bottom: 0; }
        label { font-weight: 600; display: block; margin: 8px 0 4px; color: #5C7C6B; }
        .grafico-container { background: #FDF7F0; border-radius: 24px; padding: 12px; margin-top: 12px; text-align: center; }
        canvas { max-width: 100%; margin: 0 auto; }
        .cumplimiento { font-size: 0.85rem; text-align: center; margin-top: 8px; padding: 8px; border-radius: 20px; }
        .cumplimiento.excelente { background: #D4EDDA; color: #155724; }
        .cumplimiento.regular { background: #FFF3CD; color: #856404; }
        .cumplimiento.malo { background: #F8D7DA; color: #721C24; }
        .bar-chart { display: flex; justify-content: center; align-items: flex-end; gap: 20px; height: 150px; margin: 15px 0; }
        .bar { width: 50px; background: #A7E0D0; border-radius: 12px 12px 0 0; transition: height 0.3s; text-align: center; font-size: 12px; font-weight: bold; color: #2c5e4a; }
        .bar-label { margin-top: 8px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ==================== DATOS DE LOS 5 CUESTIONARIOS ====================
    const quizzesData = [
        { id:1, title:"📚 Mitos de la 'Vieja Escuela'",
          questions:["¿El pan integral no aporta calorías?","¿El desayuno es obligatorio para bajar de peso?","¿El consumo de azúcar causa diabetes tipo 1?","¿La miel es una alternativa 'libre' para personas con diabetes?","¿Beber agua durante la comida engorda?","¿El aceite de oliva es la mejor opción para cocinar?","¿Los lácteos son la única fuente de calcio?","¿Sudar en el sauna ayuda a perder grasa corporal?","¿Los alimentos 'bio' o 'eco' son siempre bajos en calorías?","¿Es perjudicial comer fruta después de las comidas?"],
          answers:[false,false,false,false,false,true,false,false,false,false],
          explanations:["Falso: Aporta calorías similares al blanco, pero más fibra.","Falso: Lo importante es el total de nutrientes del día.","Falso: La diabetes tipo 1 es autoinmune.","Falso: Sigue siendo azúcar y eleva la glucosa.","Falso: El agua tiene 0 calorías.","Verdadero: Es muy estable al calor.","Falso: Se encuentra en almendras, espinacas, tofu.","Falso: Solo pierdes líquidos y electrolitos.","Falso: Pueden ser orgánicos y tener mucha grasa.","Falso: La fruta es saludable en cualquier momento."] },
        { id:2, title:"✨ Superalimentos y Tendencias",
          questions:["¿El vinagre de manzana elimina la grasa acumulada?","¿La dieta Keto es superior a otras para perder peso?","¿El café causa deshidratación crónica?","¿Los frutos secos deben evitarse por su alto contenido calórico?","¿La sal rosada es nutritivamente superior a la sal de mesa?","¿Es necesario hacer 'detox' para limpiar el organismo?","¿El aceite de coco previene enfermedades del corazón?","¿Comer picante sustituye al ejercicio para quemar calorías?","¿La chía puede sustituir una comida completa?","¿Comer 6 veces al día acelera el metabolismo?"],
          answers:[false,false,false,false,false,false,false,false,false,false],
          explanations:["Falso: No tiene esa capacidad.","Falso: No es mejor que una dieta equilibrada.","Falso: El agua del café compensa.","Falso: Son saciantes y cardiosaludables.","Falso: Los minerales extra son insignificantes.","Falso: El hígado y riñones ya lo hacen.","Falso: Tiene muchas grasas saturadas.","Falso: El aumento es temporal y mínimo.","Falso: Es un complemento, no sustituto.","Falso: La frecuencia no cambia el gasto energético."] },
        { id:3, title:"🛒 Compras y Etiquetas",
          questions:["¿'Sin azúcar añadida' significa que el producto es libre de azúcar?","¿Las verduras congeladas pierden su valor nutricional?","¿El chocolate con alto porcentaje de cacao tiene beneficios?","¿Las barras energéticas son siempre una opción sana?","¿Un producto 'Light' se puede consumir sin control?","¿El pan de masa madre es más fácil de digerir?","¿La margarina es más saludable que la mantequilla tradicional?","¿El yogur griego es mejor que el desnatado convencional?","¿Es obligatorio eliminar el gluten para llevar una vida sana?","¿Los embutidos se consideran carne saludable por su proteína?"],
          answers:[false,false,true,false,false,true,false,true,false,false],
          explanations:["Falso: Contiene azúcares naturales.","Falso: Mantienen casi todas sus vitaminas.","Verdadero: Aporta flavonoides antioxidantes.","Falso: Muchas son ultraprocesadas.","Falso: Solo tiene reducción calórica.","Verdadero: La fermentación reduce antinutrientes.","Falso: Depende del proceso; muchas tienen grasas hidrogenadas.","Verdadero: Más proteína y menos azúcar.","Falso: Solo para celíacos o sensibilidad probada.","Falso: Son carnes procesadas con riesgos."] },
        { id:4, title:"🏋️ Deporte y Rendimiento",
          questions:["¿Se debe tomar proteína inmediatamente después de entrenar?","¿Los suplementos de colágeno son mágicos para las articulaciones?","¿Beber demasiada agua puede ser peligroso?","¿La creatina causa daño renal en personas sanas?","¿Entrenar en ayunas garantiza perder más grasa?","¿El músculo pesa más que la grasa por el mismo volumen?","¿Las bebidas isotónicas son recomendables para el día a día?","¿Levantar pesas hará que una mujer desarrolle músculos exagerados?","¿Hacer abdominales elimina la grasa localizada en la cintura?","¿La falta de sueño dificulta la pérdida de peso?"],
          answers:[false,false,true,false,false,true,false,false,false,true],
          explanations:["Falso: La ventana es de varias horas.","Falso: Se descompone en aminoácidos.","Verdadero: Hiponatremia por dilución de minerales.","Falso: Es muy seguro.","Falso: Depende del balance energético diario.","Verdadero: El músculo es más denso.","Falso: Solo para deportistas de alto rendimiento.","Falso: Por hormonas, es muy lento.","Falso: La grasa se pierde de forma genérica.","Verdadero: Aumenta ghrelina y disminuye saciedad."] },
        { id:5, title:"🌱 Hábitos y Realidades",
          questions:["¿Las zanahorias mejoran la visión por encima de lo normal?","¿Comer despacio ayuda a controlar el peso?","¿El alcohol aporta nutrientes esenciales?","¿Combinar legumbres con cereales mejora la calidad de la proteína?","¿Hablar mientras se come puede causar indigestión?","¿Cocinar las verduras al vapor es mejor que hervirlas?","¿Es peligroso mezclar sandía con lácteos?","¿La cáscara de los vegetales es donde hay más pesticidas?","¿El té verde es un sustituto de la dieta para adelgazar?","¿Se puede tener obesidad y tener los exámenes de sangre normales?"],
          answers:[false,true,false,true,true,true,false,true,false,true],
          explanations:["Falso: Mantienen salud ocular, no corrigen visión.","Verdadero: Permite llegar la señal de saciedad.","Falso: Calorías vacías.","Verdadero: Forman perfil completo de aminoácidos.","Verdadero: Se ingiere aire que causa gases.","Verdadero: Se conservan vitaminas hidrosolubles.","Falso: Mito sin base científica.","Verdadero: Lavar bien o pelar.","Falso: Ayuda ligeramente, no compensa mala dieta.","Verdadero: Obesidad metabólicamente sana, pero riesgo persiste."] }
    ];

    // ==================== GESTIÓN DE DATOS ====================
    const STORAGE_KEY = 'nutrimind_profile';
    const CONSENT_KEY = 'nutrimind_consent';
    const CONTACTOS_KEY = 'nutrimind_emergencia';
    const PSICOLOGIA_KEY = 'nutrimind_psicologia';
    const FOOD_LOG_KEY = 'nutrimind_foodlog_v5'; // versión solo gramos
    const HIDRATACION_KEY = 'nutrimind_hidratacion';

    function getProfile() { return localStorage.getItem(STORAGE_KEY) ? JSON.parse(localStorage.getItem(STORAGE_KEY)) : null; }
    function saveProfile(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function getConsent() { return localStorage.getItem(CONSENT_KEY) === 'true'; }
    function setConsent(v) { localStorage.setItem(CONSENT_KEY, v); }
    function getContactos() { const c = localStorage.getItem(CONTACTOS_KEY); return c ? JSON.parse(c) : { contacto1: { nombre: "", telefono: "" }, contacto2: { nombre: "", telefono: "" } }; }
    function saveContactos(contactos) { localStorage.setItem(CONTACTOS_KEY, JSON.stringify(contactos)); }
    function getPsicologia() { const p = localStorage.getItem(PSICOLOGIA_KEY); return p ? JSON.parse(p) : { telefono: "", email: "" }; }
    function savePsicologia(data) { localStorage.setItem(PSICOLOGIA_KEY, JSON.stringify(data)); }
    
    // Grupos de alimentos ampliados
    const gruposAlimentos = ["Verduras", "Frutas", "Cereales/Tubérculos", "Leguminosas y legumbres", "Lácteos", "Proteínas (carnes, huevo)", "Grasas saludables", "Azúcares/Ultraprocesados"];
    const tiemposComida = ["Desayuno", "Media mañana", "Almuerzo", "Media tarde", "Cena"];
    function getDefaultFoodLog() {
        let registro = {};
        tiemposComida.forEach(t => { registro[t] = { alimentos: [] }; });
        return { fecha: new Date().toDateString(), registro };
    }
    function getFoodLog() {
        const f = localStorage.getItem(FOOD_LOG_KEY);
        if(!f) return getDefaultFoodLog();
        const parsed = JSON.parse(f);
        if(parsed.fecha !== new Date().toDateString()) return getDefaultFoodLog();
        return parsed;
    }
    function saveFoodLog(log) { localStorage.setItem(FOOD_LOG_KEY, JSON.stringify(log)); }
    
    // Registro de hidratación
    function getHidratacion() {
        const h = localStorage.getItem(HIDRATACION_KEY);
        if(!h) return { fecha: new Date().toDateString(), agua: 0, jugosNaturales: 0, bebidasAzucaradas: 0 };
        const parsed = JSON.parse(h);
        if(parsed.fecha !== new Date().toDateString()) return { fecha: new Date().toDateString(), agua: 0, jugosNaturales: 0, bebidasAzucaradas: 0 };
        return parsed;
    }
    function saveHidratacion(data) { localStorage.setItem(HIDRATACION_KEY, JSON.stringify(data)); }

    // Funciones de hábitos y riesgo
    const HABIT_LOGS_KEY = 'nutrimind_habit_logs';
    const NOTES_KEY = 'nutrimind_notes';
    const REMINDER_KEY = 'nutrimind_reminder_tasks';
    function getHabitLogs() { const l = localStorage.getItem(HABIT_LOGS_KEY); return l ? JSON.parse(l) : []; }
    function saveHabitLog(log) { let logs = getHabitLogs(); logs.push(log); if(logs.length>30) logs.shift(); localStorage.setItem(HABIT_LOGS_KEY, JSON.stringify(logs)); }
    function getNotes() { return localStorage.getItem(NOTES_KEY) || ""; }
    function saveNotes(notes) { localStorage.setItem(NOTES_KEY, notes); }
    function getReminderTasks() { const t = localStorage.getItem(REMINDER_KEY); if(!t) return { date: new Date().toDateString(), tasks: { habit: false, quote: false, meal: false } }; return JSON.parse(t); }
    function saveReminderTasks(tasks) { localStorage.setItem(REMINDER_KEY, JSON.stringify(tasks)); }
    const motivationalQuotes = ["🌸 Tu cuerpo es un jardín, cuídalo con amor.", "🍎 Cada bocado consciente es un acto de autocuidado.", "💖 No necesitas dietas extremas, necesitas equilibrio.", "🌿 Eres más que un número en la balanza.", "✨ Pequeños hábitos, grandes cambios."];
    function getRandomQuote() { return motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)]; }

    // Pantalla de consentimiento (igual)
    function renderConsentScreen() {
        return `<div class="consent-screen"><div class="app-header"><h1><i class="fas fa-shield-alt"></i> NutriMind</h1><p>Confianza y transparencia</p></div>
            <div class="consent-content"><div class="card"><div class="card-title"><i class="fas fa-lock"></i> Consentimiento informado</div>
            <p>Antes de comenzar, necesitamos tu autorización para realizar preguntas sobre tus hábitos alimentarios, salud y bienestar.</p><br>
            <p><strong>🔒 Privacidad garantizada:</strong> Toda la información se almacena <strong>únicamente en tu dispositivo</strong>. No se enviará a ningún servidor.</p><br>
            <p>Los datos recopilados tienen como finalidad ofrecerte una experiencia personalizada. Nunca serán públicos.</p>
            <div style="margin:24px 0;"><button class="btn-primary" id="acceptConsentBtn">✅ Acepto y quiero continuar</button>
            <button class="btn-outline" id="declineConsentBtn">❌ No acepto, salir</button></div></div></div></div>`;
    }
    function renderProfileScreen() {
        return `<div class="app-header"><h1><i class="fas fa-seedling"></i> NutriMind ✨</h1><p>¡Completa tu perfil y empecemos!</p><div style="text-align:center;">🍏🍊🥗🐣</div></div>
            <div class="main-content"><div class="card"><div class="card-title"><i class="fas fa-id-card"></i> Datos personales</div>
            <div class="profile-field"><label>Nombre *</label><input type="text" id="profileName" placeholder="Ej: Martita"></div>
            <div class="profile-field"><label>Edad *</label><input type="number" id="profileAge" placeholder="16-18 años" min="12" max="25"></div>
            <div class="profile-field"><label>Género</label><select id="profileGender"><option value="">Prefiero no decirlo</option><option value="femenino">Femenino</option><option value="masculino">Masculino</option></select></div>
            <div class="profile-field"><label>Institución</label><input type="text" id="profileSchool" placeholder="Nombre del colegio"></div>
            <div class="profile-field"><label>Hábitos iniciales</label><select id="profileHabits"><option value="balanceado">Suelo comer balanceado 🥗</option><option value="a_veces">A veces salto comidas ⏩</option><option value="frecuente">Frecuentemente como ultraprocesados 🍔</option></select></div>
            <button class="btn-primary" id="saveProfileBtn">✨ ¡Guardar y empezar! ✨</button></div></div>`;
    }

    // Pantalla principal
    function renderMainApp(profile) {
        const nombre = profile.nombre || "usuario";
        const currentQuote = getRandomQuote();
        const savedNotes = getNotes();
        const reminderTasks = getReminderTasks();
        const isToday = reminderTasks.date === new Date().toDateString();
        const tasks = reminderTasks.tasks;
        const contactos = getContactos();
        const psicologia = getPsicologia();
        const hidratacion = getHidratacion();
        return `<div class="app-header"><h1><i class="fas fa-heart"></i> NutriMind</h1><div class="greeting">🌸 Hola, ${nombre} 🌸</div><p>Prevención con mucho amor</p><div style="font-size:12px;">🍎✨ come feliz, siéntete radiante ✨🍎</div></div>
            <div class="main-content" id="mainContent"><div id="globalAlertContainer"></div>
            <div id="view-home" class="view"><div class="card"><div class="card-title"><i class="fas fa-clipboard-list"></i> Tu bienestar hoy</div>
            <button class="btn-primary" id="quickTestBtn"><i class="fas fa-play"></i> Autoevaluación</button>
            <button class="btn-outline" id="habitGoBtn"><i class="fas fa-chart-line"></i> Registrar hábitos</button>
            <div style="background:#FCF2E5; border-radius:20px; padding:10px; margin-top:12px;"><i class="fas fa-lightbulb"></i> Tip: ¡Reír libera endorfinas y ayuda a tu digestión!</div></div>
            <div class="quote-card" id="motivationalQuoteCard"><i class="fas fa-star" style="color:#FFB347;"></i> <span id="quoteText">${currentQuote}</span><br><span style="font-size:11px;">👉 toca para nueva frase</span></div>
            <div class="card"><div class="card-title"><i class="fas fa-bell"></i> Recordatorios diarios ⏰</div>
            <div class="reminder-checkbox"><input type="checkbox" id="remindHabit" ${isToday && tasks.habit ? 'checked' : ''}> <label>✅ Registrar mis hábitos hoy</label></div>
            <div class="reminder-checkbox"><input type="checkbox" id="remindQuote" ${isToday && tasks.quote ? 'checked' : ''}> <label>📖 Leer una frase motivadora</label></div>
            <div class="reminder-checkbox"><input type="checkbox" id="remindMeal" ${isToday && tasks.meal ? 'checked' : ''}> <label>🍽️ Comer sin pantallas</label></div>
            <button class="btn-outline" id="saveReminderBtn">Guardar progreso del día</button><p id="reminderMessage" style="font-size:12px;"></p></div>
            <div class="card"><div class="card-title"><i class="fas fa-chart-bar"></i> Estadísticas de hábitos</div><div id="statsContainer" style="background:#F7F2EA; border-radius:24px; padding:12px;">Cargando...</div></div>
            <div class="card"><div class="card-title"><i class="fas fa-pen-alt"></i> Mis notas 💭</div><textarea id="notesArea" class="notes-area" rows="3" placeholder="Escribe aquí...">${savedNotes}</textarea><button class="btn-primary" id="saveNotesBtn">Guardar notas</button></div>

    // Renderizar cuestionarios (sin imágenes)
    function renderQuizzes() {
        const container = document.getElementById('quizzesContainer');
        if(!container) return;
        let html = '';
        quizzesData.forEach(quiz => {
            html += `<div class="quiz-module" id="quiz-${quiz.id}"><div class="quiz-header"><h3>${quiz.title}</h3></div><div id="questions-${quiz.id}"></div><button class="btn-primary" data-quiz-id="${quiz.id}">✅ Calificar cuestionario</button><div id="result-${quiz.id}" class="quiz-result hidden"></div></div>`;
        });
        container.innerHTML = html;
        quizzesData.forEach(quiz => {
            const qContainer = document.getElementById(`questions-${quiz.id}`);
            let qHtml = '';
            quiz.questions.forEach((q, idx) => {
                qHtml += `<div class="question-item"><div class="question-text">${idx+1}. ${q}</div><div class="options"><label><input type="radio" name="q${quiz.id}_${idx}" value="true"> ✅ Verdadero</label><label><input type="radio" name="q${quiz.id}_${idx}" value="false"> ❌ Falso</label></div></div>`;
            });
            qContainer.innerHTML = qHtml;
        });
        document.querySelectorAll('[data-quiz-id]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const qid = parseInt(btn.dataset.quizId);
                const quiz = quizzesData.find(q => q.id === qid);
                let correctas = 0;
                for(let i=0; i<quiz.questions.length; i++) {
                    const selected = document.querySelector(`input[name="q${qid}_${i}"]:checked`);
                    if(selected && (selected.value === 'true') === quiz.answers[i]) correctas++;
                }
                const porcentaje = (correctas/quiz.questions.length)*100;
                let mensaje = `Obtuviste ${correctas} de ${quiz.questions.length} correctas (${porcentaje}%). `;
                if(porcentaje>=80) mensaje+="🎉 ¡Excelente!";
                else if(porcentaje>=50) mensaje+="👍 Bien, puedes repasar.";
                else mensaje+="📚 Lee las explicaciones para aprender más.";
                let explicaciones = '';
                for(let i=0; i<quiz.questions.length; i++) {
                    const selected = document.querySelector(`input[name="q${qid}_${i}"]:checked`);
                    const userAnswer = selected ? (selected.value === 'true') : null;
                    if(userAnswer !== quiz.answers[i]) {
                        explicaciones += `<p><strong>${i+1}. ${quiz.questions[i]}</strong><br>👉 ${quiz.explanations[i]}</p>`;
                    }
                }
                if(explicaciones) mensaje += `<br><br><strong>📖 Aprende de tus errores:</strong><br>${explicaciones}`;
                const resultDiv = document.getElementById(`result-${qid}`);
                resultDiv.innerHTML = `<div style="background:#E8F5E9; padding:12px; border-radius:24px;">${mensaje}</div>`;
                resultDiv.classList.remove('hidden');
            });
        });
    }

    // Gráfico de líneas para riesgo
    function drawRiskLineChart() {
        const canvas = document.getElementById('riskLineChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const logs = getHabitLogs();
        const last7 = logs.slice(-7);
        const riskValues = last7.map(l => l.risk === 'green' ? 1 : (l.risk === 'yellow' ? 2 : 3));
        canvas.width = 300; canvas.height = 150;
        ctx.clearRect(0,0,300,150);
        if(riskValues.length === 0) { ctx.fillText("Sin datos", 120, 75); return; }
        const w = 300, h = 150;
        const stepX = w / (riskValues.length - 1 || 1);
        const points = riskValues.map((v, i) => ({ x: i * stepX, y: h - 20 - (v-1)*40 }));
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.strokeStyle = "#FFB347";
        ctx.lineWidth = 3;
        ctx.stroke();
        points.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 2*Math.PI); ctx.fillStyle = "#FFB347"; ctx.fill(); });
        ctx.fillStyle = "#5C7C6B";
        ctx.font = "10px Nunito";
        ctx.fillText("Verde (1)", 10, h-20-0); ctx.fillText("Amarillo (2)", 10, h-20-40); ctx.fillText("Rojo (3)", 10, h-20-80);
    }

    // Renderizar formulario de comidas SOLO CON GRAMOS
    function renderFoodLog() {
        const container = document.getElementById('foodLogContainer');
        if(!container) return;
        const foodLog = getFoodLog();
        let html = '';
        tiemposComida.forEach(tiempo => {
            const items = foodLog.registro[tiempo].alimentos;
            html += `<div class="food-log"><h4>${tiempo}</h4><div id="items-${tiempo}">`;
            items.forEach((item, idx) => {
                html += `<div class="food-log-row" style="margin-bottom:8px;">
                            <input type="text" placeholder="Alimento" value="${item.nombre.replace(/"/g, '&quot;')}" data-tiempo="${tiempo}" data-idx="${idx}" data-field="nombre" style="flex:2">
                            <input type="number" placeholder="Gramos (g)" value="${item.gramos}" data-tiempo="${tiempo}" data-idx="${idx}" data-field="gramos" style="flex:1" step="1" min="0">
                            <select data-tiempo="${tiempo}" data-idx="${idx}" data-field="grupo" style="flex:2">
                                ${gruposAlimentos.map(g => `<option value="${g}" ${item.grupo===g ? 'selected' : ''}>${g}</option>`).join('')}
                            </select>
                            <button class="btn-outline" style="width:auto; margin:0;" data-eliminar="${tiempo},${idx}">🗑️</button>
                         </div>`;
            });
            html += `<button class="btn-outline" data-agregar="${tiempo}" style="margin-top:5px;">+ Agregar alimento</button></div></div>`;
        });
        container.innerHTML = html;
        // Eventos dinámicos
        document.querySelectorAll('[data-field]').forEach(el => {
            el.addEventListener('change', (e) => {
                const tiempo = el.dataset.tiempo;
                const idx = parseInt(el.dataset.idx);
                const field = el.dataset.field;
                const newValue = el.value;
                const log = getFoodLog();
                if(field === 'nombre') log.registro[tiempo].alimentos[idx].nombre = newValue;
                else if(field === 'gramos') log.registro[tiempo].alimentos[idx].gramos = parseFloat(newValue) || 0;
                else if(field === 'grupo') log.registro[tiempo].alimentos[idx].grupo = newValue;
                saveFoodLog(log);
                renderFoodLog();
                drawFoodPieChart();
            });
        });
        document.querySelectorAll('[data-eliminar]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const [tiempo, idx] = btn.dataset.eliminar.split(',');
                const log = getFoodLog();
                log.registro[tiempo].alimentos.splice(parseInt(idx),1);
                saveFoodLog(log);
                renderFoodLog();
                drawFoodPieChart();
            });
        });
        document.querySelectorAll('[data-agregar]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tiempo = btn.dataset.agregar;
                const log = getFoodLog();
                log.registro[tiempo].alimentos.push({ nombre: "", gramos: 0, grupo: "Verduras" });
                saveFoodLog(log);
                renderFoodLog();
            });
        });
        drawFoodPieChart();
    }

    // Gráfico de torta y mensaje de cumplimiento (solo gramos)
    function drawFoodPieChart() {
        const canvas = document.getElementById('foodPieChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const foodLog = getFoodLog();
        const gruposGramos = {};
        gruposAlimentos.forEach(g => gruposGramos[g] = 0);
        tiemposComida.forEach(t => {
            foodLog.registro[t].alimentos.forEach(al => {
                const gramos = parseFloat(al.gramos) || 0;
                if(gruposGramos.hasOwnProperty(al.grupo)) gruposGramos[al.grupo] += gramos;
                else gruposGramos[al.grupo] = gramos;
            });
        });
        const total = Object.values(gruposGramos).reduce((a,b)=>a+b,0);
        if(total === 0) {
            ctx.fillStyle = "#ccc";
            ctx.fillRect(0,0,200,200);
            ctx.fillStyle = "#333";
            ctx.font = "12px Nunito";
            ctx.fillText("Sin datos", 70, 100);
            document.getElementById('cumplimientoMensaje').innerHTML = "Registra alimentos en gramos para ver tu plato saludable.";
            return;
        }
        const verdurasFrutas = gruposGramos["Verduras"] + gruposGramos["Frutas"];
        const proteinas = gruposGramos["Proteínas (carnes, huevo)"] + gruposGramos["Leguminosas y legumbres"];
        const carbohidratos = gruposGramos["Cereales/Tubérculos"];
        const pctVerdFrut = (verdurasFrutas / total) * 100;
        const pctProteinas = (proteinas / total) * 100;
        const pctCarbos = (carbohidratos / total) * 100;
        let mensaje = "";
        let clase = "";
        if(pctVerdFrut >= 45 && pctVerdFrut <= 55 && pctProteinas >= 20 && pctProteinas <= 30 && pctCarbos >= 20 && pctCarbos <= 30) {
            mensaje = "🎉 ¡Excelente! Tu plato se acerca al ideal colombiano (50% verduras/frutas, 25% proteínas+leguminosas, 25% carbohidratos).";
            clase = "excelente";
        } else if(pctVerdFrut >= 35 && pctProteinas >= 15 && pctCarbos >= 15) {
            mensaje = "👍 Buen trabajo, pero puedes mejorar el equilibrio. Recuerda: mitad del plato verduras y frutas.";
            clase = "regular";
        } else {
            mensaje = "⚠️ Tu plato necesita más variedad. Intenta incluir más verduras, frutas, leguminosas y reduce ultraprocesados.";
            clase = "malo";
        }
        document.getElementById('cumplimientoMensaje').innerHTML = `<strong>Composición del día (gramos):</strong><br>
            🥗 Verduras+Frutas: ${pctVerdFrut.toFixed(1)}%<br>
            🍗 Proteínas+Leguminosas: ${pctProteinas.toFixed(1)}%<br>
            🍚 Carbohidratos: ${pctCarbos.toFixed(1)}%<br>
            🧀 Lácteos: ${((gruposGramos["Lácteos"]/total)*100).toFixed(1)}%<br>
            🥑 Grasas: ${((gruposGramos["Grasas saludables"]/total)*100).toFixed(1)}%<br>
            🍬 Azúcares/Ultraproc.: ${((gruposGramos["Azúcares/Ultraprocesados"]/total)*100).toFixed(1)}%<br><br>
            ${mensaje}`;
        document.getElementById('cumplimientoMensaje').className = `cumplimiento ${clase}`;
        
        // Dibujar torta
        const colores = ["#4CAF50","#8BC34A","#FFC107","#FF9800","#F44336","#9C27B0","#00BCD4","#E91E63"];
        let start = 0;
        const w = 200, h = 200, radio = 80;
        ctx.clearRect(0,0,w,h);
        const gruposConValor = gruposAlimentos.filter(g => gruposGramos[g] > 0);
        gruposConValor.forEach((g, idx) => {
            const valor = gruposGramos[g];
            if(valor === 0) return;
            const angulo = (valor / total) * 2 * Math.PI;
            ctx.beginPath();
            ctx.fillStyle = colores[idx % colores.length];
            ctx.moveTo(w/2, h/2);
            ctx.arc(w/2, h/2, radio, start, start + angulo);
            ctx.fill();
            start += angulo;
        });
    }

    // Gráfico de barras para hidratación y alerta de riesgo
    function drawHidratacionChart() {
        const container = document.getElementById('hidratacionChartContainer');
        if(!container) return;
        const hidratacion = getHidratacion();
        const maxVal = Math.max(hidratacion.agua, hidratacion.jugosNaturales, hidratacion.bebidasAzucaradas, 1);
        const alturaMax = 100;
        const aguaAltura = (hidratacion.agua / maxVal) * alturaMax;
        const jugosAltura = (hidratacion.jugosNaturales / maxVal) * alturaMax;
        const azucarAltura = (hidratacion.bebidasAzucaradas / maxVal) * alturaMax;
        
        container.innerHTML = `<div class="bar-chart">
            <div><div class="bar" style="height: ${aguaAltura}px; background: #4FC3F7;"></div><div class="bar-label">💧 Agua<br>${hidratacion.agua} vasos</div></div>
            <div><div class="bar" style="height: ${jugosAltura}px; background: #81C784;"></div><div class="bar-label">🍹 Jugos<br>${hidratacion.jugosNaturales} vasos</div></div>
            <div><div class="bar" style="height: ${azucarAltura}px; background: #EF5350;"></div><div class="bar-label">🥤 Azucaradas<br>${hidratacion.bebidasAzucaradas} vasos</div></div>
        </div>`;
        
        // Alerta de riesgo por bebidas azucaradas
        const alertaDiv = document.getElementById('hidratacionAlerta');
        if(hidratacion.bebidasAzucaradas > 2) {
            alertaDiv.innerHTML = "⚠️ ¡Cuidado! El consumo elevado de bebidas azucaradas (más de 2 vasos al día) aumenta el riesgo de obesidad, diabetes y caries. Intenta reemplazarlas por agua o jugos naturales sin azúcar.";
            alertaDiv.classList.remove('hidden');
            alertaDiv.classList.add('risk-alert');
        } else if(hidratacion.bebidasAzucaradas > 0) {
            alertaDiv.innerHTML = "💡 Moderar el consumo de bebidas azucaradas ayuda a mantener un peso saludable. Prefiere agua o jugos naturales.";
            alertaDiv.classList.remove('hidden');
            alertaDiv.classList.remove('risk-alert');
        } else {
            alertaDiv.classList.add('hidden');
        }
    }

    // Lógica principal (igual que antes, con las nuevas funciones)
    function initAppLogic() {
        const views = { home: document.getElementById('view-home'), test: document.getElementById('view-test'), habits: document.getElementById('view-habits'), education: document.getElementById('view-education'), support: document.getElementById('view-support') };
        const navBtns = document.querySelectorAll('.nav-item');
        const globalAlertContainer = document.getElementById('globalAlertContainer');
        function showView(viewId) {
            Object.keys(views).forEach(k => views[k]?.classList.add('hidden'));
            if(views[viewId]) views[viewId].classList.remove('hidden');
            navBtns.forEach(btn => { if(btn.dataset.view === viewId) btn.classList.add('active'); else btn.classList.remove('active'); });
            if(viewId === 'education') renderQuizzes();
            if(viewId === 'test') renderTestQuestions();
            if(viewId === 'home') { updateStatsDisplay(); updateReminderUI(); }
            if(viewId === 'habits') { renderFoodLog(); drawRiskLineChart(); updateHidratacionUI(); drawHidratacionChart(); }
        }
        const testQuestions = [
            { text: "¿Con qué frecuencia te saltas comidas?", options: ["Nunca","Rara vez","A veces","Frecuentemente"] },
            { text: "¿Has seguido dietas restrictivas sin supervisión?", options: ["Nunca","Una vez","Varias veces","Constantemente"] },
            { text: "¿Te preocupa excesivamente tu peso o figura?", options: ["Nada","Poco","Moderadamente","Mucho"] },
            { text: "¿Las redes sociales afectan negativamente tu imagen corporal?", options: ["No influye","Poco","Bastante","Muchísimo"] }
        ];
        function renderTestQuestions() {
            const container = document.getElementById('testQuestions');
            if(!container) return;
            let html = '';
            testQuestions.forEach((q, idx) => {
                html += `<div><strong>${idx+1}. ${q.text}</strong><div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:5px;">`;
                q.options.forEach((opt, optIdx) => { html += `<label><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</label>`; });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }
        function computeRisk() {
            let total = 0;
            for(let i=0; i<testQuestions.length; i++) {
                let selected = document.querySelector(`input[name="q${i}"]:checked`);
                if(!selected) return null;
                total += parseInt(selected.value);
            }
            if(total <= 3) return 'low';
            if(total <= 6) return 'medium';
            return 'high';
        }
        function displayTestResult(risk) {
            const area = document.getElementById('testResultArea');
            let msg = risk==='low'?'✅ Riesgo bajo: ¡súper! Sigue así.': risk==='medium'?'⚠️ Riesgo medio: puedes mejorar.':'🔴 Riesgo alto: busca apoyo profesional.';
            area.innerHTML = `<div class="alert-banner">${msg}</div>`;
            localStorage.setItem('nutriRisk', risk);
            updateHomeAlerts();
            if(risk === 'high') showGlobalAlert("🔔 Alerta: test con riesgo alto. Usa el canal de apoyo.");
        }
        function evaluateHabits(meals, fruits, ultra) {
            if(meals <= 1 || ultra >= 3) return 'red';
            if(meals < 3 || fruits < 2 || ultra > 2) return 'yellow';
            return 'green';
        }
        function updateTrafficLightUI(level) {
            const g = document.getElementById('lightGreen'), y = document.getElementById('lightYellow'), r = document.getElementById('lightRed');
            if(g && y && r) { [g,y,r].forEach(l => l.classList.remove('green','yellow','red'));
            if(level === 'green') g.classList.add('green');
            else if(level === 'yellow') y.classList.add('yellow');
            else if(level === 'red') r.classList.add('red'); }
        }
        function saveHabits() {
            const meals = parseInt(document.getElementById('mealsCount').value);
            const fruits = parseInt(document.getElementById('fruitVeg').value);
            const ultra = parseInt(document.getElementById('ultraProcessed').value);
            const risk = evaluateHabits(meals, fruits, ultra);
            updateTrafficLightUI(risk);
            let feedback = risk==='green'?'🟢 ¡Excelente!': risk==='yellow'?'🟡 Puedes mejorar':'🔴 Riesgo, contacta apoyo';
            document.getElementById('habitFeedback').innerHTML = feedback;
            const alertDiv = document.getElementById('habitAlertMsg');
            if(risk === 'red') { alertDiv.classList.remove('hidden'); alertDiv.innerHTML = '⚠️ Alerta: hábitos en riesgo.'; showGlobalAlert("🚨 Tus hábitos necesitan atención."); }
            else alertDiv.classList.add('hidden');
            saveHabitLog({ date: new Date().toISOString(), meals, fruits, ultra, risk });
            showGlobalAlert("📊 ¡Hábitos guardados!");
            updateStatsDisplay();
            drawRiskLineChart();
            const reminder = getReminderTasks();
            if(reminder.date === new Date().toDateString()) reminder.tasks.habit = true;
            else { reminder.date = new Date().toDateString(); reminder.tasks = { habit: true, quote: reminder.tasks?.quote || false, meal: reminder.tasks?.meal || false }; }
            saveReminderTasks(reminder);
            updateReminderUI();
        }
        function updateStatsDisplay() {
            const logs = getHabitLogs();
            if(logs.length === 0) { document.getElementById('statsContainer').innerHTML = "Aún no hay datos."; return; }
            const last7 = logs.slice(-7);
            const green = last7.filter(l => l.risk === 'green').length;
            const yellow = last7.filter(l => l.risk === 'yellow').length;
            const red = last7.filter(l => l.risk === 'red').length;
            document.getElementById('statsContainer').innerHTML = `📅 Últimos 7 días:<br>🟢 Verde: ${green}  🟡 Amarillo: ${yellow}  🔴 Rojo: ${red}<br>🍽️ Promedio comidas: ${(last7.reduce((a,b)=>a+b.meals,0)/last7.length).toFixed(1)}`;
        }
        function updateHomeAlerts() {
            const risk = localStorage.getItem('nutriRisk');
            const msgElem = document.getElementById('lastTestMsg');
            if(msgElem) {
                if(risk === 'high') msgElem.innerHTML = '⚠️ Riesgo alto - busca apoyo.';
                else if(risk === 'medium') msgElem.innerHTML = '🟡 Riesgo medio - revisa el semáforo.';
                else if(risk === 'low') msgElem.innerHTML = '✅ Riesgo bajo - sigue así.';
                else msgElem.innerHTML = 'Aún no has realizado el test.';
            }
        }
        function showGlobalAlert(message) {
            if(!globalAlertContainer) return;
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert-banner';
            alertDiv.innerHTML = `<i class="fas fa-bell"></i> ${message} <button style="float:right;" onclick="this.parentElement.remove()">✖</button>`;
            globalAlertContainer.prepend(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }
        function updateReminderUI() {
            const reminder = getReminderTasks();
            const isToday = reminder.date === new Date().toDateString();
            const tasks = reminder.tasks;
            const h = document.getElementById('remindHabit'); if(h) h.checked = isToday && tasks.habit;
            const q = document.getElementById('remindQuote'); if(q) q.checked = isToday && tasks.quote;
            const m = document.getElementById('remindMeal'); if(m) m.checked = isToday && tasks.meal;
        }
        function saveReminderTasksUI() {
            const habit = document.getElementById('remindHabit').checked;
            const quote = document.getElementById('remindQuote').checked;
            const meal = document.getElementById('remindMeal').checked;
            saveReminderTasks({ date: new Date().toDateString(), tasks: { habit, quote, meal } });
            document.getElementById('reminderMessage').innerHTML = "✅ Progreso guardado.";
            setTimeout(() => document.getElementById('reminderMessage').innerHTML = "", 2000);
        }
        function saveNotes() { saveNotes(document.getElementById('notesArea').value); showGlobalAlert("📝 Notas guardadas."); }
        function refreshQuote() { document.getElementById('quoteText').innerText = getRandomQuote(); const reminder = getReminderTasks(); if(reminder.date === new Date().toDateString()) reminder.tasks.quote = true; else { reminder.date = new Date().toDateString(); reminder.tasks = { habit: false, quote: true, meal: false }; } saveReminderTasks(reminder); updateReminderUI(); }
        
        function saveContactos() {
            const contactos = { contacto1: { nombre: document.getElementById('emergNombre1').value, telefono: document.getElementById('emergTelefono1').value }, contacto2: { nombre: document.getElementById('emergNombre2').value, telefono: document.getElementById('emergTelefono2').value } };
            saveContactos(contactos); showGlobalAlert("📞 Contactos de emergencia guardados.");
        }
        function savePsicologia() { savePsicologia({ telefono: document.getElementById('psicoTelefono').value, email: document.getElementById('psicoEmail').value }); showGlobalAlert("🧠 Contacto de psicología guardado."); }
        function saveHidratacionUI() {
            const agua = parseInt(document.getElementById('hidratacionAgua').value) || 0;
            const jugos = parseInt(document.getElementById('hidratacionJugos').value) || 0;
            const azucar = parseInt(document.getElementById('hidratacionAzucar').value) || 0;
            saveHidratacion({ fecha: new Date().toDateString(), agua, jugosNaturales: jugos, bebidasAzucaradas: azucar });
            showGlobalAlert("💧 Hidratación guardada.");
            drawHidratacionChart();
        }
        function updateHidratacionUI() {
            const h = getHidratacion();
            document.getElementById('hidratacionAgua').value = h.agua;
            document.getElementById('hidratacionJugos').value = h.jugosNaturales;
            document.getElementById('hidratacionAzucar').value = h.bebidasAzucaradas;
            drawHidratacionChart();
        }
        
        document.getElementById('quickTestBtn')?.addEventListener('click', () => showView('test'));
        document.getElementById('habitGoBtn')?.addEventListener('click', () => showView('habits'));
        document.getElementById('submitTestBtn')?.addEventListener('click', () => { const risk = computeRisk(); if(risk) displayTestResult(risk); else alert("Responde todas."); });
        document.getElementById('saveHabitsBtn')?.addEventListener('click', saveHabits);
        document.getElementById('saveReminderBtn')?.addEventListener('click', saveReminderTasksUI);
        document.getElementById('saveNotesBtn')?.addEventListener('click', saveNotes);
        document.getElementById('motivationalQuoteCard')?.addEventListener('click', refreshQuote);
        document.getElementById('saveContactosBtn')?.addEventListener('click', saveContactos);
        document.getElementById('savePsicologiaBtn')?.addEventListener('click', savePsicologia);
        document.getElementById('saveFoodLogBtn')?.addEventListener('click', () => { renderFoodLog(); drawFoodPieChart(); showGlobalAlert("🍽️ Registro de comidas guardado."); });
        document.getElementById('saveHidratacionBtn')?.addEventListener('click', saveHidratacionUI);
        document.getElementById('irApoyoBtn')?.addEventListener('click', () => showView('support'));
        navBtns.forEach(btn => btn.addEventListener('click', () => showView(btn.dataset.view)));
        showView('home');
        renderTestQuestions();
        updateHomeAlerts();
        updateTrafficLightUI(null);
        updateStatsDisplay();
        drawRiskLineChart();
    }

    function bootstrap() {
        const consent = getConsent();
        const profile = getProfile();
        const root = document.getElementById('appRoot');
        if(!consent) {
            root.innerHTML = renderConsentScreen();
            document.getElementById('acceptConsentBtn')?.addEventListener('click', () => { setConsent(true); bootstrap(); });
            document.getElementById('declineConsentBtn')?.addEventListener('click', () => alert("Puedes cerrar la página."));
            return;
        }
        if(!profile) {
            root.innerHTML = renderProfileScreen();
            document.getElementById('saveProfileBtn').addEventListener('click', () => {
                const nombre = document.getElementById('profileName').value.trim();
                const edad = document.getElementById('profileAge').value;
                if(!nombre || !edad) { alert("Nombre y edad obligatorios"); return; }
                saveProfile({ nombre, edad: parseInt(edad), genero: document.getElementById('profileGender').value, institucion: document.getElementById('profileSchool').value.trim() || "No especificada", habitosIniciales: document.getElementById('profileHabits').value, fechaRegistro: new Date().toISOString() });
                bootstrap();
            });
        } else {
            root.innerHTML = renderMainApp(profile);
            initAppLogic();
        }
    }
    bootstrap();
</script>
</body>
</html>
